<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of users registered on the platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>List of users registered on the platform</h1>
    <ul>
        {% for user in users %}
            <li>{{ user.first_name }} {{ user.last_name }} - {{ user.email }}</li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('export_data', format='excel') }}">Click here to download data in Excel format</a>
    <a href="{{ url_for('export_data', format='pdf') }}">Click here to download data in PDF format</a>
</body>
</html>
